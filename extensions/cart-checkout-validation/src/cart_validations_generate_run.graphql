query CartValidationsGenerateRunInput {
  buyerJourney {
    step
  }

  shop {
    validationEnabled: metafield(
      namespace: "smartb2b"
      key: "validation_enabled"
    ) {
      value
    }
    blockOrdersWhenCreditUnavailable: metafield(
      namespace: "smartb2b"
      key: "block_orders_when_credit_unavailable"
    ) {
      value
    }
  }

  cart {
    cost {
      totalAmount {
        amount
      }
    }

    buyerIdentity {
      customer {
        userCreditLimit: metafield(
          namespace: "custom"
          key: "user_credit_limit"
        ) {
          value
        }

        userCreditUsed: metafield(
          namespace: "custom"
          key: "user_credit_used"
        ) {
          value
        }
      }

      purchasingCompany {
        company {
          creditLimit: metafield(
            namespace: "custom"
            key: "company_credit_limit"
          ) {
            value
          }

          creditUsed: metafield(
            namespace: "custom"
            key: "company_credit_used"
          ) {
            value
          }
        }
      }
    }
  }
}
